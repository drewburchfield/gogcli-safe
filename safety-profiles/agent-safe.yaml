# agent-safe profile for gogcli-safe fork.
#
# Principle: block permanently destructive operations and external sends.
# Allow editing, drafting, and any operation that's recoverable via trash
# or Google's revision history. Destructive auth state mutation is blocked
# (re-auth via the full `gog` binary, not gog-safe); additive `auth add` is
# allowed since it only creates a new account credential.
#
# This is a tighter variant of upstream's agent-safe, curated for coding-
# agent use. Diffs from upstream: enables docs/sheets/slides edits
# (revision-history recoverable), enables gmail.trash and contacts CRUD,
# blocks chat reactions and calendar.respond as external sends, locks
# destructive auth writes (set/remove/manage/keyring) but allows additive
# `auth add`.
#
# Used by build-safe.sh and the drewburchfield/tap homebrew formula.

name: agent-safe
description: Curated agent profile for gogcli-safe. Allows reading, drafting, editing (with revision-history recovery), and recoverable side effects. Blocks external sends, permanent deletes, sharing, admin, and destructive auth writes (allows additive auth add).

version: true
schema: true
exit-codes: true
agent:
  exit-codes: true

gmail:
  # Reads
  search: true
  get: true
  messages: true
  attachment: true
  url: true
  history: true
  thread:
    get: true
    modify: true
    attachments: true
  labels:
    list: true
    get: true
    create: true
    rename: true
    modify: true
    delete: false       # destroys org state, not recoverable
    style: true
  batch:
    modify: true
    delete: false       # permanent
  archive: true
  mark-read: true
  unread: true
  trash: true           # Gmail trash has 30-day recovery
  send: false           # external
  autoreply: false      # external-impact setting
  track: false
  drafts:
    list: true
    get: true
    create: true
    update: true
    delete: false       # drafts have no trash bin
    send: false
  # Admin / external-impact settings
  settings: false
  watch: false
  autoforward: false
  delegates: false
  filters: false
  forwarding: false
  sendas: false
  vacation: false
  forward: false

calendar:
  # Reads
  calendars: true
  acl: true
  alias: true
  events: true
  event: true
  freebusy: true
  colors: true
  conflicts: true
  search: true
  time: true
  users: true
  team: true
  # Writes (recoverable / no external notification)
  subscribe: true       # unsubscribe is recoverable
  create: true
  update: true
  move: true
  propose-time: true    # generates URL only
  focus-time: true      # personal block
  working-location: true # cosmetic, recoverable
  create-calendar: true # recoverable
  # External / notification-emitting
  delete: false         # cancels event, emails attendees
  respond: false        # RSVPs notify host
  out-of-office: false  # triggers auto-replies

drive:
  ls: true
  search: true
  get: true
  download: true
  upload: true
  mkdir: true
  copy: true
  move: true
  rename: true
  permissions: true     # read-only
  url: true
  drives: true
  delete: false         # could be permanent
  share: false          # external visibility
  unshare: false        # hard to verify reversal
  comments:
    list: true
    get: true
    create: true
    update: true
    reply: true
    delete: false       # not recoverable via revision

sites:
  list: true
  search: true
  get: true
  url: true

contacts:
  search: true
  list: true
  get: true
  export: true
  create: true          # recoverable
  update: true          # recoverable
  delete: false         # Google contacts delete is not reliably recoverable
  directory:
    list: true
    search: true
  other:
    list: true
    search: true
    delete: false

tasks: false            # using clings instead

docs:
  # Reads
  export: true
  info: true
  cat: true
  list-tabs: true
  structure: true
  # Edits (Google Docs revision history covers all)
  create: true
  copy: true
  write: true
  insert: true
  update: true
  edit: true
  sed: true
  find-replace: true
  clear: true
  delete: false         # whole-doc delete; use drive trash if needed
  comments:
    list: true
    get: true
    add: true
    reply: true
    resolve: true       # unresolve restores
    delete: false       # comment delete not in revision history

sheets:
  # Reads
  get: true
  metadata: true
  notes: true
  links: true
  read-format: true
  export: true
  # Edits (Sheets version history covers all)
  update: true
  append: true
  insert: true
  update-note: true
  format: true
  merge: true
  unmerge: true
  number-format: true
  freeze: true
  resize-columns: true
  resize-rows: true
  find-replace: true
  clear: true
  create: true
  copy: true
  add-tab: true
  rename-tab: true
  delete-tab: true      # version history restores tabs
  named-ranges:
    list: true
    get: true
    add: true
    update: true
    delete: true        # version history restores
  chart:
    list: true
    get: true
    create: true
    update: true
    delete: true        # version history restores

slides:
  # Reads
  export: true
  info: true
  list-slides: true
  read-slide: true
  thumbnail: true
  # Edits (revision history covers all)
  create: true
  create-from-markdown: true
  create-from-template: true
  copy: true
  add-slide: true
  delete-slide: true
  update-notes: true
  replace-slide: true
  insert-text: true
  replace-text: true

chat:
  spaces:
    list: true
    find: true
    create: false       # invites others
  messages:
    list: true
    send: false         # external
    react: false        # reactions notify others
    reactions: false
  threads:
    list: true
  dm:
    send: false
    space: false

forms:
  get: true
  responses:
    list: true
    get: true
  create: false         # observable
  update: false
  publish: false        # makes form live
  add-question: false
  delete-question: false
  move-question: true   # reordering only
  watch: false

appscript:
  get: true
  content: true
  run: false            # arbitrary code execution
  create: false         # creates triggerable code

people:
  me: true
  get: true
  search: true
  relations: true

groups:
  list: true
  members: true

keep: false             # not used

# Auth state changes go through full `gog`, not gog-safe.
auth:
  credentials:
    list: true
    set: false
    remove: false
  services: true
  list: true
  doctor: true
  alias:
    list: true
    set: false
    unset: false
  status: true
  keyring: false
  add: true            # additive: creates a new account credential, non-destructive
  remove: false
  tokens:
    list: true
    delete: false
    export: false
    import: false
  manage: false
  service-account:
    status: true
    set: false
    unset: false
  keep: false

config:
  get: true
  keys: true
  list: true
  path: true
  set: false
  unset: false
  no-send:
    list: true
    set: false
    remove: false

time: true
classroom: false
admin: false
backup: false
completion: false
__complete: false

aliases:
  ls: true
  search: true
  open: true
  download: true
  upload: true
  status: true
  me: true
  whoami: true
  send: false           # mirrors gmail send
  login: false          # auth flow
  logout: false
